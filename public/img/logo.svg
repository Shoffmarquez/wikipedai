<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" width="300" height="340">
  <defs>
    <radialGradient id="globeGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="60%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </radialGradient>
    <radialGradient id="lobsterGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#6d0000"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- === GLOBE === -->
  <circle cx="150" cy="155" r="68" fill="url(#globeGrad)" filter="url(#shadow)"/>

  <!-- Globe grid lines -->
  <g stroke="rgba(255,255,255,0.25)" stroke-width="1" fill="none">
    <!-- Equator -->
    <ellipse cx="150" cy="155" rx="68" ry="16"/>
    <!-- Tropics -->
    <ellipse cx="150" cy="130" rx="55" ry="12"/>
    <ellipse cx="150" cy="180" rx="55" ry="12"/>
    <!-- Meridians -->
    <ellipse cx="150" cy="155" rx="22" ry="68"/>
    <ellipse cx="150" cy="155" rx="45" ry="68"/>
  </g>

  <!-- Globe landmass silhouette (simplified) -->
  <g fill="rgba(255,255,255,0.18)">
    <ellipse cx="135" cy="140" rx="18" ry="14"/>
    <ellipse cx="162" cy="150" rx="16" ry="10"/>
    <ellipse cx="148" cy="168" rx="12" ry="8"/>
    <ellipse cx="125" cy="165" rx="9" ry="6"/>
    <ellipse cx="172" cy="135" rx="8" ry="6"/>
  </g>

  <!-- Neural network dots on globe -->
  <g filter="url(#glow)" fill="#00e5ff" opacity="0.9">
    <circle cx="138" cy="138" r="2.5"/>
    <circle cx="158" cy="145" r="2.5"/>
    <circle cx="148" cy="160" r="2.5"/>
    <circle cx="128" cy="155" r="2"/>
    <circle cx="170" cy="155" r="2"/>
    <circle cx="145" cy="130" r="2"/>
    <circle cx="165" cy="140" r="2"/>
  </g>
  <!-- Connection lines -->
  <g stroke="#00e5ff" stroke-width="0.8" opacity="0.6">
    <line x1="138" y1="138" x2="158" y2="145"/>
    <line x1="158" y1="145" x2="148" y2="160"/>
    <line x1="148" y1="160" x2="128" y2="155"/>
    <line x1="138" y1="138" x2="145" y2="130"/>
    <line x1="158" y1="145" x2="165" y2="140"/>
    <line x1="158" y1="145" x2="170" y2="155"/>
  </g>

  <!-- "AI" text on globe -->
  <text x="150" y="162" text-anchor="middle" font-family="Arial Black, Impact, sans-serif"
        font-size="26" font-weight="900" fill="#00e5ff" filter="url(#glow)" letter-spacing="2">AI</text>

  <!-- === LOBSTER BODY === -->
  <!-- Main body/carapace -->
  <ellipse cx="150" cy="108" rx="28" ry="38" fill="url(#lobsterGrad)" filter="url(#shadow)"/>
  <!-- Body segment lines -->
  <g stroke="rgba(0,0,0,0.25)" stroke-width="1.5" fill="none">
    <ellipse cx="150" cy="108" rx="28" ry="38"/>
    <line x1="122" y1="108" x2="178" y2="108"/>
    <line x1="124" y1="98"  x2="176" y2="98"/>
    <line x1="124" y1="118" x2="176" y2="118"/>
    <line x1="125" y1="128" x2="175" y2="128"/>
  </g>
  <!-- Tail segments -->
  <g fill="url(#lobsterGrad)">
    <ellipse cx="150" cy="84" rx="22" ry="10"/>
    <ellipse cx="150" cy="74" rx="17" ry="8"/>
    <ellipse cx="150" cy="65" rx="13" ry="7"/>
  </g>
  <!-- Tail fan -->
  <g fill="#8b0000" stroke="#5c0000" stroke-width="0.5">
    <ellipse cx="133" cy="57" rx="10" ry="5" transform="rotate(-25 133 57)"/>
    <ellipse cx="142" cy="54" rx="9"  ry="4" transform="rotate(-10 142 54)"/>
    <ellipse cx="150" cy="53" rx="9"  ry="4"/>
    <ellipse cx="158" cy="54" rx="9"  ry="4" transform="rotate(10 158 54)"/>
    <ellipse cx="167" cy="57" rx="10" ry="5" transform="rotate(25 167 57)"/>
  </g>

  <!-- === ANTENNAE === -->
  <g stroke="#8b0000" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 138 78 Q 110 50 85 30"/>
    <path d="M 135 80 Q 108 60 88 48"/>
    <path d="M 162 78 Q 190 50 215 30"/>
    <path d="M 165 80 Q 192 60 212 48"/>
  </g>
  <!-- Antenna tips -->
  <g fill="#e53935">
    <circle cx="85"  cy="30" r="3"/>
    <circle cx="88"  cy="48" r="2.5"/>
    <circle cx="215" cy="30" r="3"/>
    <circle cx="212" cy="48" r="2.5"/>
  </g>

  <!-- === LEFT CLAW === -->
  <g fill="url(#lobsterGrad)" filter="url(#shadow)">
    <!-- Left arm -->
    <path d="M 122 120 Q 85 130 72 148 Q 68 162 80 168 Q 90 174 100 165 Q 108 155 115 145 Q 120 135 122 120 Z"/>
    <!-- Left claw top -->
    <path d="M 80 168 Q 62 180 58 196 Q 56 210 68 214 Q 80 218 88 206 Q 94 196 90 184 Q 87 175 80 168 Z"/>
    <!-- Left claw bottom -->
    <path d="M 90 184 Q 75 185 68 196 Q 63 205 68 214 Z"/>
    <ellipse cx="90" cy="200" rx="14" ry="9" transform="rotate(-20 90 200)"/>
    <ellipse cx="75" cy="205" rx="12" ry="7" transform="rotate(-30 75 205)"/>
  </g>
  <!-- Left claw knuckle details -->
  <g stroke="rgba(0,0,0,0.2)" stroke-width="1" fill="none">
    <ellipse cx="90" cy="200" rx="14" ry="9" transform="rotate(-20 90 200)"/>
    <ellipse cx="75" cy="205" rx="12" ry="7" transform="rotate(-30 75 205)"/>
  </g>

  <!-- === RIGHT CLAW === -->
  <g fill="url(#lobsterGrad)" filter="url(#shadow)">
    <!-- Right arm -->
    <path d="M 178 120 Q 215 130 228 148 Q 232 162 220 168 Q 210 174 200 165 Q 192 155 185 145 Q 180 135 178 120 Z"/>
    <!-- Right claw top -->
    <path d="M 220 168 Q 238 180 242 196 Q 244 210 232 214 Q 220 218 212 206 Q 206 196 210 184 Q 213 175 220 168 Z"/>
    <!-- Right claw bottom -->
    <path d="M 210 184 Q 225 185 232 196 Q 237 205 232 214 Z"/>
    <ellipse cx="210" cy="200" rx="14" ry="9" transform="rotate(20 210 200)"/>
    <ellipse cx="225" cy="205" rx="12" ry="7" transform="rotate(30 225 205)"/>
  </g>
  <!-- Right claw knuckle details -->
  <g stroke="rgba(0,0,0,0.2)" stroke-width="1" fill="none">
    <ellipse cx="210" cy="200" rx="14" ry="9" transform="rotate(20 210 200)"/>
    <ellipse cx="225" cy="205" rx="12" ry="7" transform="rotate(30 225 205)"/>
  </g>

  <!-- === LOBSTER EYES === -->
  <circle cx="138" cy="88" r="5" fill="#1a0000"/>
  <circle cx="162" cy="88" r="5" fill="#1a0000"/>
  <circle cx="138" cy="87" r="2.5" fill="#fff" opacity="0.6"/>
  <circle cx="162" cy="87" r="2.5" fill="#fff" opacity="0.6"/>

  <!-- Small walking legs -->
  <g stroke="#8b0000" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M 125 128 Q 105 138 98 150"/>
    <path d="M 126 134 Q 106 146 100 158"/>
    <path d="M 126 140 Q 108 152 103 164"/>
    <path d="M 175 128 Q 195 138 202 150"/>
    <path d="M 174 134 Q 194 146 200 158"/>
    <path d="M 174 140 Q 192 152 197 164"/>
  </g>

  <!-- === TEXT === -->
  <text x="150" y="268" text-anchor="middle"
        font-family="Arial Black, Impact, sans-serif"
        font-size="32" font-weight="900"
        fill="#1a237e" letter-spacing="1">WIKIPEDAI</text>

  <text x="150" y="292" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="13" font-weight="700"
        fill="#1a237e" letter-spacing="3">THE AI ENCYCLOPEDIA</text>
</svg>
