<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <filter id="lobster-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Body (main segment) -->
  <ellipse cx="60" cy="55" rx="18" ry="22" fill="#E74C3C" filter="url(#lobster-shadow)"/>

  <!-- Body segments (darker shade) -->
  <g stroke="#C0392B" stroke-width="0.8" fill="none">
    <ellipse cx="60" cy="55" rx="18" ry="22"/>
    <line x1="42" y1="55" x2="78" y2="55"/>
    <line x1="42" y1="45" x2="78" y2="45"/>
    <line x1="43" y1="65" x2="77" y2="65"/>
  </g>

  <!-- Head -->
  <circle cx="60" cy="35" r="10" fill="#E74C3C" filter="url(#lobster-shadow)"/>

  <!-- Left eye stalk -->
  <line x1="55" y1="33" x2="48" y2="25" stroke="#C0392B" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Left eye -->
  <circle cx="46" cy="23" r="3.5" fill="#000"/>
  <circle cx="46" cy="23" r="1.5" fill="#fff"/>

  <!-- Right eye stalk -->
  <line x1="65" y1="33" x2="72" y2="25" stroke="#C0392B" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right eye -->
  <circle cx="74" cy="23" r="3.5" fill="#000"/>
  <circle cx="74" cy="23" r="1.5" fill="#fff"/>

  <!-- Smile/mouth -->
  <path d="M 55 38 Q 60 41 65 38" stroke="#FFB6B6" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Left rosy cheek -->
  <circle cx="48" cy="37" r="2.5" fill="#FFB6B6" opacity="0.6"/>
  <!-- Right rosy cheek -->
  <circle cx="72" cy="37" r="2.5" fill="#FFB6B6" opacity="0.6"/>

  <!-- Tail segments -->
  <ellipse cx="60" cy="80" rx="15" ry="8" fill="#E74C3C"/>
  <ellipse cx="60" cy="92" rx="11" ry="6" fill="#E74C3C"/>
  <ellipse cx="60" cy="101" rx="8" ry="5" fill="#E74C3C"/>

  <!-- Tail fan (5 segments) -->
  <ellipse cx="45" cy="106" rx="6" ry="3.5" fill="#C0392B" transform="rotate(-30 45 106)"/>
  <ellipse cx="52" cy="108" rx="6.5" ry="3" fill="#E74C3C" transform="rotate(-15 52 108)"/>
  <ellipse cx="60" cy="109" rx="7" ry="3" fill="#E74C3C"/>
  <ellipse cx="68" cy="108" rx="6.5" ry="3" fill="#E74C3C" transform="rotate(15 68 108)"/>
  <ellipse cx="75" cy="106" rx="6" ry="3.5" fill="#C0392B" transform="rotate(30 75 106)"/>

  <!-- Left antenna -->
  <path d="M 52 30 Q 35 20 25 12" stroke="#C0392B" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <circle cx="24" cy="11" r="1.5" fill="#C0392B"/>

  <!-- Right antenna -->
  <path d="M 68 30 Q 85 20 95 12" stroke="#C0392B" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <circle cx="96" cy="11" r="1.5" fill="#C0392B"/>

  <!-- Left claw (upper) -->
  <path d="M 43 65 Q 28 72 22 85 Q 20 92 28 95 Q 34 97 38 88 Q 40 80 43 72 Z" fill="#E74C3C" filter="url(#lobster-shadow)"/>
  <!-- Left claw details -->
  <g stroke="#C0392B" stroke-width="0.6" fill="none">
    <path d="M 28 95 Q 18 98 15 108"/>
    <path d="M 35 88 Q 25 95 20 105"/>
  </g>

  <!-- Right claw (upper) -->
  <path d="M 77 65 Q 92 72 98 85 Q 100 92 92 95 Q 86 97 82 88 Q 80 80 77 72 Z" fill="#E74C3C" filter="url(#lobster-shadow)"/>
  <!-- Right claw details -->
  <g stroke="#C0392B" stroke-width="0.6" fill="none">
    <path d="M 92 95 Q 102 98 105 108"/>
    <path d="M 85 88 Q 95 95 100 105"/>
  </g>

  <!-- Legs (small walking legs) -->
  <g stroke="#C0392B" stroke-width="0.8" fill="none" stroke-linecap="round">
    <path d="M 48 70 Q 35 75 30 82"/>
    <path d="M 48 77 Q 32 82 25 90"/>
    <path d="M 72 70 Q 85 75 90 82"/>
    <path d="M 72 77 Q 88 82 95 90"/>
  </g>
</svg>
