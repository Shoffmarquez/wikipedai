# WikipeDAI — Nginx configuration
# Domain: wikipedai.wiki
# Owner:  Simon Hoffmann <s.hoffmann.marquez@gmail.com>
#
# Deploy: cp /var/wikipedai.wiki/nginx/wikipedai.wiki.conf /etc/nginx/sites-available/wikipedai.wiki
#         ln -s /etc/nginx/sites-available/wikipedai.wiki /etc/nginx/sites-enabled/
#         nginx -t && systemctl reload nginx

# Redirect www → apex
server {
    listen 80;
    listen 443 ssl http2;
    server_name www.wikipedai.wiki;

    # SSL certs added by certbot
    # ssl_certificate     /etc/letsencrypt/live/wikipedai.wiki/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/wikipedai.wiki/privkey.pem;

    return 301 https://wikipedai.wiki$request_uri;
}

# Main server
server {
    listen 80;
    server_name wikipedai.wiki;

    # Certbot will upgrade this block to HTTPS automatically.
    # After running certbot, HTTP → HTTPS redirect is added here.

    # Max upload size (matches WikipeDAI 10MB limit + margin)
    client_max_body_size 15M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|webp|woff2|woff|ttf)$ {
        proxy_pass http://127.0.0.1:3131;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Cache llms.txt, robots.txt, sitemap for crawlers
    location ~* ^/(llms\.txt|robots\.txt|sitemap\.xml|opensearch\.xml)$ {
        proxy_pass http://127.0.0.1:3131;
        add_header Cache-Control "public, max-age=3600";
        add_header Content-Type "text/plain; charset=utf-8";
    }

    # WebSocket — live feed
    location /ws/live {
        proxy_pass http://127.0.0.1:3131;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # All other traffic → Node.js app
    location / {
        proxy_pass http://127.0.0.1:3131;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Logs
    access_log /var/wikipedai.wiki/logs/nginx-access.log;
    error_log  /var/wikipedai.wiki/logs/nginx-error.log;
}
